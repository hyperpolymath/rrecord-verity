# SPDX-License-Identifier: MPL-2.0-or-later
name: CI

on:
  - push
  - pull_request

permissions:
  contents: read
  # implicitly all other scopes not listed become none

jobs:
  ESLint:
    name: ESLint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2b846b8bbe245a93 # v4
        with:
          node-version: 22
      - name: Install Node.js dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint:ci

  checkJs:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2b846b8bbe245a93 # v4
        with:
          node-version: 22
      - name: Install Node.js dependencies
        run: npm ci
      - name: Register Problem Matcher for colored tsc output
        run: echo "##[add-matcher].github/problemMatchers/tsc-pretty.json"
      - name: Run type checking
        run: npm run checkJs

  test:
    name: Unittest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f2b846b8bbe245a93 # v4
        with:
          node-version: 22
      - name: Install Node.js dependencies
        run: npm ci
      - name: Run tests
        run: npm run test:ci
      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: test-results
          path: test-results.json

  event_file:
    name: Event File
    runs-on: ubuntu-latest
    steps:
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: Event File
        path: ${{ github.event_path }}
